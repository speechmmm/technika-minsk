<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Техника Минск</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f5; --card: #ffffff; --accent: #2563eb;
    --accent-light: #eff6ff; --text: #111827; --muted: #6b7280;
    --border: #e5e7eb; --radius: 16px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 80px; }
  .header { background: var(--card); padding: 16px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .logo { font-size: 18px; font-weight: 700; }
  .logo span { color: var(--accent); }
  .find-btn { background: var(--accent-light); border: none; border-radius: 10px; padding: 8px 14px; color: var(--accent); font-size: 14px; font-weight: 600; cursor: pointer; }
  .search-wrap { position: relative; }
  .search { width: 100%; padding: 10px 16px 10px 40px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; background: var(--bg); outline: none; color: var(--text); }
  .search:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .categories { display: flex; gap: 8px; padding: 14px 16px; overflow-x: auto; scrollbar-width: none; }
  .categories::-webkit-scrollbar { display: none; }
  .cat-btn { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--muted); white-space: nowrap; }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .section-title { font-size: 16px; font-weight: 700; padding: 4px 16px 12px; }
  .not-found-banner { margin: 0 12px 16px; background: var(--accent-light); border: 1.5px solid var(--accent); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .not-found-icon { font-size: 28px; flex-shrink: 0; }
  .not-found-text h4 { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .not-found-text p { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .products { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px; }
  .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
  .product-card:active { transform: scale(0.97); }
  .product-img { width: 100%; height: 150px; object-fit: cover; display: block; background: #f9fafb; }
  .product-info { padding: 10px 12px 12px; }
  .product-name { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .product-category { font-size: 11px; color: var(--accent); font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .product-price { font-size: 16px; font-weight: 700; }
  .no-results { text-align: center; padding: 40px 20px; color: var(--muted); grid-column: 1/-1; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); width: 100%; max-height: 90vh; border-radius: 20px 20px 0 0; overflow-y: auto; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-img { width: 100%; height: 260px; object-fit: cover; }
  .modal-header { position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.4); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 20px; }
  .modal-category { font-size: 12px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .modal-price { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 16px; }
  .modal-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; white-space: pre-line; }
  .btn-primary { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
  .btn-secondary { width: 100%; padding: 14px; background: var(--accent-light); color: var(--accent); border: 1.5px solid var(--accent); border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .form-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: none; align-items: flex-end; }
  .form-overlay.open { display: flex; }
  .form-sheet { background: var(--card); width: 100%; border-radius: 20px 20px 0 0; padding: 24px 20px 32px; animation: slideUp 0.3s ease; }
  .form-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .form-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; background: var(--bg); color: var(--text); }
  .form-input:focus { border-color: var(--accent); }
  .success-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 400; display: none; align-items: center; justify-content: center; }
  .success-overlay.open { display: flex; }
  .success-card { background: var(--card); border-radius: 20px; padding: 32px 24px; text-align: center; width: calc(100% - 48px); max-width: 320px; }
  .success-icon { font-size: 56px; margin-bottom: 16px; }
  .success-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .success-text { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 24px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Техника <span>Минск</span></div>
    <button class="find-btn" onclick="openNotFound()">🔍 Найти товар</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" type="text" placeholder="Поиск товаров..." oninput="filterProducts(this.value)">
  </div>
</div>

<div class="categories">
  <button class="cat-btn active" onclick="filterCategory('all', this)">Все</button>
  <button class="cat-btn" onclick="filterCategory('kitchen', this)">Кухня</button>
  <button class="cat-btn" onclick="filterCategory('personal', this)">Уход</button>
  <button class="cat-btn" onclick="filterCategory('climate', this)">Климат</button>
  <button class="cat-btn" onclick="filterCategory('builtin', this)">Встраиваемая</button>
</div>

<p class="section-title" id="sectionTitle">Все товары</p>

<div class="not-found-banner" onclick="openNotFound()">
  <div class="not-found-icon">🛒</div>
  <div class="not-found-text">
    <h4>Не нашли нужный товар?</h4>
    <p>Найдем любую технику с маркетплейсов Беларуси под заказ</p>
  </div>
</div>

<div class="products" id="products"></div>

<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <img class="modal-img" id="modalImg" src="" alt="">
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-category" id="modalCategory"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <button class="btn-primary" onclick="openForm('order')">Оставить заявку</button>
      <button class="btn-secondary" onclick="closeModal()">Назад к каталогу</button>
    </div>
  </div>
</div>

<div class="form-overlay" id="formOverlay">
  <div class="form-sheet">
    <div class="form-title" id="formTitle">Оставить заявку</div>
    <div class="form-subtitle" id="formSubtitle">Менеджер свяжется с вами в течение 30 минут</div>
    <div class="form-group">
      <label class="form-label">Ваше имя</label>
      <input class="form-input" id="inputName" placeholder="Введите имя" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">Телефон или Telegram</label>
      <input class="form-input" id="inputContact" placeholder="+375 XX XXX-XX-XX" type="tel">
    </div>
    <div class="form-group" id="searchGroup" style="display:none">
      <label class="form-label">Что ищете?</label>
      <input class="form-input" id="inputSearch" placeholder="Название товара или модель">
    </div>
    <div class="form-group" id="budgetGroup" style="display:none">
      <label class="form-label">Примерный бюджет</label>
      <input class="form-input" id="inputBudget" placeholder="Например: до 1000 руб.">
    </div>
    <button class="btn-primary" onclick="submitForm()" style="margin-top:8px">Отправить заявку</button>
    <button class="btn-secondary" onclick="closeForm()">Отмена</button>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <div class="success-icon">✅</div>
    <div class="success-title">Заявка отправлена!</div>
    <div class="success-text">Менеджер свяжется с вами в течение 30 минут и ответит на все вопросы.</div>
    <button class="btn-primary" onclick="closeSuccess()">Отлично!</button>
  </div>
</div>

  const filtered = getFiltered();
  if (!filtered.length) {
    container.innerHTML = '<div class="no-results"><div style="font-size:40px;margin-bottom:12px">🔍</div><p>Ничего не найдено</p><p style="font-size:13px;margin-top:6px">Попробуйте другой запрос или узнайте цену у менеджера</p></div>';
    return;
  }
  container.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="openProduct(${p.id})">
      <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
      <div class="product-info">
        <div class="product-category">${p.categoryName}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${p.price}</div>
      </div>
    </div>`).join('');
}

function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const titles = {all:'Все товары',kitchen:'Кухонная техника',personal:'Личный уход',climate:'Климат',builtin:'Встраиваемая техника'};
  document.getElementById('sectionTitle').textContent = titles[cat] || 'Товары';
  renderProducts();
}

function filterProducts(val) { currentSearch = val; renderProducts(); }

function openProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  currentProductId = id;
  document.getElementById('modalImg').src = p.img;
  document.getElementById('modalCategory').textContent = p.categoryName;
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalPrice').textContent = p.price;
  document.getElementById('modalDesc').textContent = p.desc;
  document.getElementById('productModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('productModal').classList.remove('open');
  document.body.style.overflow = '';
}

function openForm(mode) {
  formMode = mode;
  closeModal();
  if (mode === 'order') {
    const p = products.find(x => x.id === currentProductId);
    document.getElementById('formTitle').textContent = 'Оставить заявку';
    document.getElementById('formSubtitle').textContent = p ? 'Товар: ' + p.name : 'Менеджер свяжется с вами';
    document.getElementById('searchGroup').style.display = 'none';
    document.getElementById('budgetGroup').style.display = 'none';
  } else {
    document.getElementById('formTitle').textContent = 'Найти товар';
    document.getElementById('formSubtitle').textContent = 'Найдем любую технику с маркетплейсов Беларуси';
    document.getElementById('searchGroup').style.display = 'block';
    document.getElementById('budgetGroup').style.display = 'block';
  }
  document.getElementById('formOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openNotFound() { openForm('search'); }
function closeForm() {
  document.getElementById('formOverlay').classList.remove('open');
  document.body.style.overflow = '';
  ['inputName','inputContact','inputSearch','inputBudget'].forEach(id => document.getElementById(id).value = '');
}

function submitForm() {
  const name = document.getElementById('inputName').value.trim();
  const contact = document.getElementById('inputContact').value.trim();
  if (!name || !contact) { alert('Заполните имя и контакт'); return; }
  closeForm();
  document.getElementById('successOverlay').classList.add('open');
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('open');
}

document.getElementById('productModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('formOverlay').addEventListener('click', function(e) { if (e.target === this) closeForm(); });

if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

renderProducts();
</script>
</body>
</html>
